<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">
    Sales Data Warehouse — Data Flow Diagram &amp; System Architecture
  </text>
  <text x="600" y="74" text-anchor="middle" font-size="14" fill="#64748b">
    SQL ETL Pipeline · Star Schema Dimensional Model
  </text>

  <!-- ===================== LEGEND ===================== -->
  <g font-size="12" fill="#334155">
    <rect x="40" y="96" width="14" height="14" rx="3" fill="#bae6fd"/>
    <text x="60" y="107">Input / Source</text>

    <rect x="180" y="96" width="14" height="14" rx="3" fill="#fde68a"/>
    <text x="200" y="107">Staging / Processing</text>

    <rect x="360" y="96" width="14" height="14" rx="3" fill="#c7d2fe"/>
    <text x="380" y="107">Dimension Tables</text>

    <rect x="540" y="96" width="14" height="14" rx="3" fill="#bbf7d0"/>
    <text x="560" y="107">Fact / Output</text>

    <rect x="700" y="96" width="14" height="14" rx="3" fill="#fecaca"/>
    <text x="720" y="107">Data Quality Gate</text>
  </g>

  <!-- ===================== STEP 1: SOURCE ===================== -->
  <g>
    <rect x="40" y="140" width="220" height="90" rx="10" fill="#bae6fd" stroke="#0284c7" stroke-width="1.5"/>
    <text x="150" y="166" text-anchor="middle" font-size="13" font-weight="700" fill="#0c4a6e">STEP 1 · SOURCE</text>
    <text x="150" y="188" text-anchor="middle" font-size="13" fill="#0c4a6e">sales_8am.Orders</text>
    <text x="150" y="206" text-anchor="middle" font-size="11" fill="#075985">Flat transactional table</text>
    <text x="150" y="220" text-anchor="middle" font-size="11" fill="#075985">OrderID, CustomerID, ProductID…</text>
  </g>

  <!-- arrow 1 -->
  <line x1="260" y1="185" x2="320" y2="185" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== STEP 2: MODEL COPY ===================== -->
  <g>
    <rect x="320" y="140" width="220" height="90" rx="10" fill="#fde68a" stroke="#b45309" stroke-width="1.5"/>
    <text x="430" y="166" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">STEP 2 · COPY</text>
    <text x="430" y="188" text-anchor="middle" font-size="13" fill="#78350f">sales_8am_model</text>
    <text x="430" y="206" text-anchor="middle" font-size="11" fill="#92400e">.Orders_model</text>
    <text x="430" y="220" text-anchor="middle" font-size="11" fill="#92400e">Raw snapshot, no transforms</text>
  </g>

  <!-- arrow 2 -->
  <line x1="540" y1="185" x2="600" y2="185" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== STEP 3: STAGING ===================== -->
  <g>
    <rect x="600" y="140" width="220" height="90" rx="10" fill="#fde68a" stroke="#b45309" stroke-width="1.5"/>
    <text x="710" y="166" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">STEP 3 · STAGING</text>
    <text x="710" y="188" text-anchor="middle" font-size="13" fill="#78350f">sales_8am_dwh_model</text>
    <text x="710" y="206" text-anchor="middle" font-size="11" fill="#92400e">.staging_model</text>
    <text x="710" y="220" text-anchor="middle" font-size="11" fill="#92400e">Warehouse-side landing table</text>
  </g>

  <!-- arrow 3 down -->
  <line x1="710" y1="230" x2="710" y2="280" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== STEP 4: TRANSFORMATION (quality gate) ===================== -->
  <g>
    <rect x="600" y="280" width="220" height="90" rx="10" fill="#fecaca" stroke="#b91c1c" stroke-width="1.5"/>
    <text x="710" y="306" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">STEP 4 · TRANSFORM</text>
    <text x="710" y="328" text-anchor="middle" font-size="13" fill="#7f1d1d">transformation_model</text>
    <text x="710" y="346" text-anchor="middle" font-size="11" fill="#991b1b">WHERE CustomerID IS NOT NULL</text>
    <text x="710" y="360" text-anchor="middle" font-size="11" fill="#991b1b">Data quality filter (view)</text>
  </g>

  <!-- arrows fan-out to 4 dimension tables -->
  <line x1="650" y1="370" x2="150" y2="450" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="685" y1="370" x2="380" y2="450" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="735" y1="370" x2="610" y2="450" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="770" y1="370" x2="840" y2="450" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== STEP 5: DIMENSION TABLES ===================== -->
  <g>
    <rect x="40" y="450" width="220" height="100" rx="10" fill="#c7d2fe" stroke="#4338ca" stroke-width="1.5"/>
    <text x="150" y="474" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">Dim_Customers</text>
    <text x="150" y="494" text-anchor="middle" font-size="11" fill="#3730a3">CustomerID, Name, Email</text>
    <text x="150" y="510" text-anchor="middle" font-size="11" fill="#3730a3">+ Surr_CustomerKey</text>
    <text x="150" y="530" text-anchor="middle" font-size="10" fill="#4f46e5">ROW_NUMBER() surrogate key</text>
  </g>

  <g>
    <rect x="270" y="450" width="220" height="100" rx="10" fill="#c7d2fe" stroke="#4338ca" stroke-width="1.5"/>
    <text x="380" y="474" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">DimProducts</text>
    <text x="380" y="494" text-anchor="middle" font-size="11" fill="#3730a3">ProductID, Name, Category</text>
    <text x="380" y="510" text-anchor="middle" font-size="11" fill="#3730a3">+ Surr_ProductKey</text>
    <text x="380" y="530" text-anchor="middle" font-size="10" fill="#4f46e5">ROW_NUMBER() surrogate key</text>
  </g>

  <g>
    <rect x="500" y="450" width="220" height="100" rx="10" fill="#c7d2fe" stroke="#4338ca" stroke-width="1.5"/>
    <text x="610" y="474" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">DimRegion</text>
    <text x="610" y="494" text-anchor="middle" font-size="11" fill="#3730a3">RegionID, Name, Country</text>
    <text x="610" y="510" text-anchor="middle" font-size="11" fill="#3730a3">+ Surr_RegionKey</text>
    <text x="610" y="530" text-anchor="middle" font-size="10" fill="#4f46e5">ROW_NUMBER() surrogate key</text>
  </g>

  <g>
    <rect x="730" y="450" width="220" height="100" rx="10" fill="#c7d2fe" stroke="#4338ca" stroke-width="1.5"/>
    <text x="840" y="474" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">DimOrderDate</text>
    <text x="840" y="494" text-anchor="middle" font-size="11" fill="#3730a3">OrderDate</text>
    <text x="840" y="510" text-anchor="middle" font-size="11" fill="#3730a3">+ Surr_OrderDateKey</text>
    <text x="840" y="530" text-anchor="middle" font-size="10" fill="#4f46e5">ROW_NUMBER() surrogate key</text>
  </g>

  <!-- arrows converge to fact table -->
  <line x1="150" y1="550" x2="540" y2="630" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="550" x2="560" y2="630" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="550" x2="600" y2="630" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="840" y1="550" x2="620" y2="630" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===================== STEP 6: FACT TABLE (output) ===================== -->
  <g>
    <rect x="420" y="630" width="360" height="110" rx="10" fill="#bbf7d0" stroke="#15803d" stroke-width="1.5"/>
    <text x="600" y="656" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">STEP 6 · OUTPUT</text>
    <text x="600" y="678" text-anchor="middle" font-size="14" fill="#14532d">Fact_Sales</text>
    <text x="600" y="698" text-anchor="middle" font-size="11" fill="#166534">OrderID, Quantity, UnitPrice, TotalAmount</text>
    <text x="600" y="714" text-anchor="middle" font-size="11" fill="#166534">+ Surr_CustomerKey, Surr_ProductKey,</text>
    <text x="600" y="728" text-anchor="middle" font-size="11" fill="#166534">Surr_RegionKey, Surr_OrderDateKey</text>
  </g>

  <!-- arrow from fact to BI -->
  <line x1="600" y1="740" x2="600" y2="780" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="450" y="780" width="300" height="60" rx="10" fill="#bbf7d0" stroke="#15803d" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="600" y="806" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Analytics / BI / Reporting</text>
    <text x="600" y="824" text-anchor="middle" font-size="10" fill="#166534">Star schema enables fast joins &amp; aggregation</text>
  </g>

  <!-- ===================== TECH STACK BADGES ===================== -->
  <g font-size="11" font-weight="600">
    <rect x="40" y="860" width="80" height="26" rx="13" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="80" y="877" text-anchor="middle" fill="#1e293b">SQL</text>

    <rect x="130" y="860" width="130" height="26" rx="13" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="195" y="877" text-anchor="middle" fill="#1e293b">Star Schema Modeling</text>

    <rect x="270" y="860" width="150" height="26" rx="13" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="345" y="877" text-anchor="middle" fill="#1e293b">Window Functions (ROW_NUMBER)</text>

    <rect x="430" y="860" width="120" height="26" rx="13" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="490" y="877" text-anchor="middle" fill="#1e293b">Views &amp; CTAS</text>

    <rect x="560" y="860" width="130" height="26" rx="13" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="625" y="877" text-anchor="middle" fill="#1e293b">Surrogate Keys</text>

    <rect x="700" y="860" width="100" height="26" rx="13" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="750" y="877" text-anchor="middle" fill="#1e293b">ETL Pipeline</text>
  </g>

</svg>
